<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Planner - Smart Study</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>

    <script type="module" src="script.js?v=10" defer></script>
</head>

<body data-theme="light">
    <audio id="pomodoro-alarm" src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU"
        preload="auto"></audio>

    <div id="dashboard-layout" class="fade-in">
        <nav class="sidebar slide-right">
            <div class="logo"><i class="fa-solid fa-graduation-cap"></i> Smart Planner</div>
            <ul class="nav-links">
                <li><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
                <li><a href="planner.html" class="active"><i class="fa-solid fa-list-check"></i> Study Planner</a></li>
                <li><a href="pomodoro.html"><i class="fa-solid fa-clock"></i> Pomodoro</a></li>
                <li><a href="notes.html"><i class="fa-solid fa-sticky-note"></i> Notes</a></li>
                <li><a href="reminders.html"><i class="fa-solid fa-clock-rotate-left"></i> Reminders</a></li>
                <li><a href="about.html"><i class="fa-solid fa-circle-info"></i> About</a></li>
            </ul>

            <div class="theme-switch-wrapper mt-auto">
                <span>Theme</span>
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox">
                    <div class="slider round"></div>
                </label>
            </div>
            <button id="logout-btn" class="btn secondary-btn w-100 mt-3"><i class="fa-solid fa-right-from-bracket"></i>
                Logout</button>
        </nav>

        <main class="main-content">
            <header class="topbar slide-down">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="global-search" placeholder="Search across app...">
                </div>
                <div class="topbar-actions">
                    <div class="notification-wrapper">
                        <i class="fa-solid fa-bell bell-icon" id="notification-bell"></i>
                        <span class="badge" id="reminder-counter">0</span>
                    </div>
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=User&background=random" class="hover-scale">
                        <span id="user-display-name">User</span>
                    </div>
                </div>
            </header>

            <div class="content-modules mt-4 stagger-1">
                <section class="card task-module" id="study-planner">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h2><i class="fa-solid fa-list-check"></i> Primary Subject Planner</h2>
                        <div class="filter-sort d-flex gap-2">
                            <select id="task-filter" aria-label="Filter Tasks">
                                <option value="all">All Status</option>
                                <option value="completed">Completed</option>
                                <option value="pending">Pending</option>
                            </select>
                            <select id="task-sort" aria-label="Sort Tasks">
                                <option value="day-by-day">Day by Day</option>
                                <option value="due-date">Date Sort</option>
                                <option value="priority">Priority Sort</option>
                            </select>
                        </div>
                    </div>
                    <form id="task-form" class="d-flex gap-2 flex-wrap mt-3">
                        <input type="text" id="task-subject" placeholder="Module Subject" required class="flex-grow-1">
                        <input type="text" id="task-desc" placeholder="Details/Chapters" required class="flex-grow-1">
                        <select id="task-priority" required>
                            <option value="High">High Priority</option>
                            <option value="Medium">Medium Priority</option>
                            <option value="Low">Low Priority</option>
                        </select>
                        <input type="date" id="task-date" required>
                        <button type="submit" class="btn primary-btn anim-btn hover-lift">Submit Task</button>
                    </form>

                    <div class="d-flex gap-2 justify-content-between mt-3">
                        <button id="reset-tasks" class="btn danger-btn btn-sm hover-lift">Clear Tasks</button>
                        <button id="download-tasks" class="btn secondary-btn btn-sm hover-lift"><i
                                class="fa-solid fa-download"></i> Download Schedule</button>
                    </div>
                    <ul id="task-list" class="list-container mt-4"></ul>
                </section>

                <section class="card task-module mt-4" id="calendar-view">
                    <div class="card-header d-flex justify-content-between align-items-center mb-3">
                        <h2><i class="fa-regular fa-calendar-days"></i> Study Calendar</h2>
                    </div>
                    <div id="calendar" style="min-height: 400px; color: var(--text-color);"></div>
                </section>

                <section class="card task-module mt-4" id="ai-planner" style="border: 2px solid var(--primary);">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h2><i class="fa-solid fa-robot"></i> AI Syllabus Planner</h2>
                    </div>
                    <div class="mt-3">
                        <label for="ai-api-key"
                            style="font-size: 0.9em; font-weight: 500; display: block; margin-bottom: 5px;">Gemini API
                            Key (saved locally)</label>
                        <input type="password" id="ai-api-key" placeholder="Enter Google Gemini API Key"
                            class="w-100 mb-3"
                            style="border: 1px solid var(--border-color); padding: 10px; border-radius: 8px;">

                        <label for="ai-syllabus-file"
                            style="font-size: 0.9em; font-weight: 500; display: block; margin-bottom: 5px;">Upload
                            Syllabus (PDF, Images, Text)</label>
                        <input type="file" id="ai-syllabus-file" accept=".pdf,image/*,.txt,.md,.json" class="w-100 mb-3"
                            style="border: 1px solid var(--border-color); padding: 10px; border-radius: 8px;">

                        <label for="ai-syllabus"
                            style="font-size: 0.9em; font-weight: 500; display: block; margin-bottom: 5px;">Or Paste
                            your
                            Syllabus or Topics</label>
                        <textarea id="ai-syllabus" rows="5"
                            placeholder="e.g. 1. Introduction to Physics\n2. Newton's Laws\n3. Thermodynamics..."
                            class="w-100 mb-3"
                            style="border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; resize: vertical; min-height: 100px;"></textarea>

                        <button id="generate-ai-schedule" class="btn primary-btn anim-btn hover-lift w-100 text-center"
                            style="padding: 12px; font-weight: 600;"><i class="fa-solid fa-wand-magic-sparkles"></i>
                            Generate Tasks & Reminders</button>
                        <div id="ai-loading" class="hidden mt-3 text-center"
                            style="color: var(--primary); font-weight: 500;">
                            <i class="fa-solid fa-circle-notch fa-spin"></i> Generating your personalized schedule...
                        </div>
                    </div>
                </section>
            </div>

            <div id="search-results-modal" class="modal hidden fade-in">
                <div class="modal-content bounce-in">
                    <span class="close-modal">&times;</span>
                    <h3>Search Results</h3>
                    <div id="search-results-container" class="mt-3"></div>
                </div>
            </div>

            <!-- Schedule Modal -->
            <div id="schedule-modal" class="modal hidden fade-in" style="z-index: 99999;">
                <div class="modal-content bounce-in" style="max-width: 400px; text-align: center;">
                    <span class="close-schedule-modal text-right"
                        style="display:block; cursor:pointer; font-size: 20px;" aria-label="Close modal">&times;</span>
                    <h3 class="mb-3" style="color: var(--primary);">Add Schedule Block</h3>
                    <input type="text" id="schedule-time-input" placeholder="Time (e.g. 8:00 AM)" class="mb-3"
                        style="width: 100%; border: 2px solid var(--border-color); border-radius: 8px; padding: 10px;">
                    <input type="text" id="schedule-desc-input" placeholder="Activity Details" class="mb-3"
                        style="width: 100%; border: 2px solid var(--border-color); border-radius: 8px; padding: 10px;">
                    <button id="save-schedule-btn" class="btn primary-btn w-100 hover-lift">Save Block</button>
                </div>
            </div>

        </main>
    </div>
</body>

</html>
